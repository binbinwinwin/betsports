<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景圓 -->
  <circle cx="32" cy="32" r="30" fill="#1d4ed8"/>

  <!-- 足球白底 -->
  <circle cx="32" cy="32" r="22" fill="#ffffff"/>

  <!-- 足球黑色六邊形圖案 -->
  <!-- 中心 -->
  <polygon points="32,20 38,24 38,32 32,36 26,32 26,24" fill="#0d1117"/>
  <!-- 上 -->
  <polygon points="32,11 38,15 38,21 32,17 26,21 26,15" fill="#0d1117" opacity="0.85"/>
  <!-- 右上 -->
  <polygon points="40,14 46,18 46,26 40,22 38,16" fill="#0d1117" opacity="0.85"/>
  <!-- 右下 -->
  <polygon points="40,34 46,30 46,38 40,42 38,36" fill="#0d1117" opacity="0.85"/>
  <!-- 下 -->
  <polygon points="32,43 38,39 38,47 32,51 26,47 26,39" fill="#0d1117" opacity="0.85"/>
  <!-- 左下 -->
  <polygon points="24,34 26,36 24,42 18,38 18,30" fill="#0d1117" opacity="0.85"/>
  <!-- 左上 -->
  <polygon points="24,14 26,16 26,22 20,26 18,18 24,14" fill="#0d1117" opacity="0.85"/>

  <!-- 外框 -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1e3a8a" stroke-width="2"/>
</svg>
