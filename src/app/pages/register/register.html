<div class="login-page register-variant">
  <div class="login-card">
    <div class="login-logo">⚽ BetSports</div>
    <h2 class="login-title">{{ 'register.title' | t }}</h2>

    @if (error()) {
      <div class="login-error">{{ error() }}</div>
    }

    <form class="login-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">{{ 'register.username' | t }}</label>
        <input
          class="form-input"
          type="text"
          [(ngModel)]="username"
          name="username"
          [placeholder]="'register.usernamePh' | t"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'register.password' | t }}</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          [placeholder]="'register.passwordPh' | t"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'register.confirmPw' | t }}</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          [placeholder]="'register.confirmPwPh' | t"
          autocomplete="new-password"
        />
      </div>

      <button class="login-btn" type="submit" [disabled]="loading()">
        @if (loading()) { {{ 'register.loading' | t }} } @else { {{ 'register.submit' | t }} }
      </button>
    </form>

    <div class="switch-link">
      {{ 'register.hasAccount' | t }}<a routerLink="/login">{{ 'register.login' | t }}</a>
    </div>
  </div>
</div>
