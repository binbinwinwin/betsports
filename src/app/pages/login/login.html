<div class="login-page">
  <div class="login-card">
    <div class="login-logo">⚽ BetSports</div>
    <h2 class="login-title">{{ 'login.title' | t }}</h2>

    @if (error()) {
      <div class="login-error">{{ error() }}</div>
    }

    <form class="login-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">{{ 'login.username' | t }}</label>
        <input
          class="form-input"
          type="text"
          [(ngModel)]="username"
          name="username"
          [placeholder]="'login.usernamePlaceholder' | t"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label class="form-label">{{ 'login.password' | t }}</label>
        <input
          class="form-input"
          type="password"
          [(ngModel)]="password"
          name="password"
          [placeholder]="'login.passwordPlaceholder' | t"
          autocomplete="current-password"
        />
      </div>

      <button class="login-btn" type="submit" [disabled]="loading()">
        @if (loading()) { {{ 'login.loading' | t }} } @else { {{ 'login.submit' | t }} }
      </button>
    </form>

    <div class="switch-link">
      {{ 'login.noAccount' | t }}<a routerLink="/register">{{ 'login.register' | t }}</a>
    </div>
  </div>
</div>
